on:
  - push
  - pull_request

name: Type checker
jobs:
  pyright:
    name: pyright
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - run: pip install uv
    - run: uv pip install --system -e .[amber,ase,pymatgen] rdkit 'openbabel>=3.2.0'
    - uses: jakebailey/pyright-action@v3
      with:
        version: 1.1.363
